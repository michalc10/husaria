services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-husaria}
      POSTGRES_USER: ${POSTGRES_USER:-husaria}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.server}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-husaria} -d ${POSTGRES_DB:-husaria}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: ./back-end
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      RUN_PRISMA_MIGRATIONS: ${RUN_PRISMA_MIGRATIONS:-true}
      SERVER_HOSTNAME: 0.0.0.0
      SERVER_PORT: 3000
      POSTGRES_URL: postgresql://${POSTGRES_USER:-husaria}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-husaria}
      DATABASE_URL: postgresql://${POSTGRES_USER:-husaria}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-husaria}
      PUBLIC_FRONTEND_URL: ${PUBLIC_FRONTEND_URL:-http://localhost}
      SERVER_CORS_ORIGIN: ${SERVER_CORS_ORIGIN:-http://localhost}
      SOCKET_CORS_ORIGIN: ${SOCKET_CORS_ORIGIN:-http://localhost}
      AUTH_COOKIE_NAME: ${AUTH_COOKIE_NAME:-husaria_session}
      AUTH_SESSION_DAYS: ${AUTH_SESSION_DAYS:-14}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-false}
      AUTH_COOKIE_DOMAIN: ${AUTH_COOKIE_DOMAIN:-}
      AUTH_SESSION_SECRET: ${AUTH_SESSION_SECRET:?Set AUTH_SESSION_SECRET in .env.server}
      JUDGE_TOKEN_SECRET: ${JUDGE_TOKEN_SECRET:?Set JUDGE_TOKEN_SECRET in .env.server}
      SERVER_TOKEN_SECRET: ${SERVER_TOKEN_SECRET:-}
      SERVER_REFRESH_TOKEN_SECRET: ${SERVER_REFRESH_TOKEN_SECRET:-}
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/ping').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  frontend:
    build:
      context: ./husaria
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      API_BASE_URL: ${FRONTEND_API_BASE_URL:-}
    ports:
      - "${HTTP_PORT:-80}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  postgres-data:
