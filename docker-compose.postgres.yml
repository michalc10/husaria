services:
  postgres:
    image: postgres:16-alpine
    container_name: husaria-postgres
    environment:
      POSTGRES_DB: husaria
      POSTGRES_USER: husaria
      POSTGRES_PASSWORD: husaria_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U husaria -d husaria"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
