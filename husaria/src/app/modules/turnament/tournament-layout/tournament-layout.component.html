<div class="tl">
  <header class="tl-control-bar">
    <div class="tl-top-row">
      <div class="tl-title-group">
        <button class="tl-back-button" type="button" (click)="confirmExitToMainPanel()">
          <i class="pi pi-arrow-left"></i>
          {{ 'tournament.backToMainPanel' | transloco }}
        </button>

        @if (tournament$ | async; as tournament) {
          <div class="tl-title">
            <p class="tl-eyebrow">{{ 'tournament.title' | transloco }}</p>
            <h1>
              <span>{{ tournament.city }}</span>
              <time>{{ tournament.date | date: 'dd.MM.yyyy' }}</time>
            </h1>
          </div>
        } @else {
          <div class="tl-title tl-title--loading">
            <p-skeleton width="12rem" height="1.35rem"></p-skeleton>
            <p-skeleton width="7rem" height="1rem"></p-skeleton>
          </div>
        }
      </div>

      <div class="tl-stage-controls">
        <button class="tl-offline-button" type="button" (click)="prepareOffline()" [disabled]="offlinePreparing">
          <i class="pi pi-cloud-download"></i>
          {{ 'offline.prepare' | transloco }}
        </button>
        <p-selectButton
          [options]="(stageOptions$ | async) ?? []"
          optionLabel="label"
          optionValue="value"
          [ngModel]="(selectedStage$ | async) ?? 'planning'"
          (ngModelChange)="onStageChange($event)"
        ></p-selectButton>
      </div>
    </div>

    <div class="tl-section-controls">
      <p-selectButton
        [options]="(options$ | async) ?? []"
        optionLabel="label"
        optionValue="value"
        [ngModel]="(selectedOption$ | async) ?? 'planning/participants'"
        (ngModelChange)="onOptionChange($event)"
      ></p-selectButton>
    </div>

    @if (offlinePrepareMessage) {
      <p class="tl-sync-message">{{ offlinePrepareMessage }}</p>
    }
  </header>

  <main class="tl-content">
    <router-outlet></router-outlet>
  </main>
</div>
